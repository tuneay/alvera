<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hesap Oluştur — Alvera</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --white:          #FFFFFF;
            --bg:             #FAFAFA;
            --text-primary:   #0A0A0A;
            --text-secondary: #525252;
            --text-muted:     #A3A3A3;
            --border:         #E5E5E5;
            --border-focus:   #0A0A0A;
            --error:          #dc2626;
            --error-bg:       #fef2f2;
            --error-border:   #fecaca;
            --radius:         10px;
            --radius-sm:      8px;
            --ease:           cubic-bezier(0.4, 0, 0.2, 1);
        }

        html { height: 100%; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--white);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ─── Dot grid background ─── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, #d4d4d4 1px, transparent 1px);
            background-size: 28px 28px;
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }

        /* ─── Top bar ─── */
        .topbar {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 32px;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
        }

        .logo {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: var(--text-primary);
            text-decoration: none;
        }

        .topbar-link {
            font-size: 13.5px;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s var(--ease);
        }

        .topbar-link span {
            color: var(--text-primary);
            font-weight: 500;
        }

        .topbar-link:hover span { text-decoration: underline; }

        /* ─── Main layout ─── */
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
            position: relative;
            z-index: 1;
        }

        /* ─── Card ─── */
        .card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 40px 36px;
            width: 100%;
            max-width: 420px;
            box-shadow:
                0 0 0 1px rgba(0,0,0,0.03),
                0 4px 6px rgba(0,0,0,0.03),
                0 16px 40px rgba(0,0,0,0.06);
            animation: cardIn 0.45s var(--ease) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-header { margin-bottom: 28px; }

        .card-eyebrow {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.8px;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .card-sub {
            font-size: 13.5px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* ─── Error banner ─── */
        .error-banner {
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-size: 13.5px;
            color: var(--error);
            animation: slideDown 0.3s var(--ease) both;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .error-icon { font-size: 14px; margin-top: 1px; flex-shrink: 0; }

        /* ─── Form ─── */
        .form { display: flex; flex-direction: column; gap: 16px; }

        .field { display: flex; flex-direction: column; gap: 6px; }

        .field-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .field-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            color: var(--text-primary);
            background: var(--white);
            outline: none;
            transition: border-color 0.25s var(--ease), box-shadow 0.25s var(--ease);
            -webkit-appearance: none;
        }

        .field-input::placeholder { color: var(--text-muted); }

        .field-input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(10,10,10,0.06);
        }

        /* İki kolon */
        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* ─── Password hint ─── */
        .field-hint {
            font-size: 11.5px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* ─── Submit ─── */
        .btn-submit {
            background: var(--text-primary);
            color: var(--white);
            border: none;
            padding: 11px 0;
            border-radius: var(--radius-sm);
            font-size: 14.5px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            width: 100%;
            margin-top: 4px;
            transition: background 0.3s var(--ease), transform 0.3s var(--ease), box-shadow 0.3s var(--ease);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-submit:hover {
            background: #1f1f1f;
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(0,0,0,0.13);
        }

        .btn-submit:active { transform: translateY(0); }

        /* ─── Divider ─── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 4px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            font-size: 11.5px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        /* ─── Terms ─── */
        .terms {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.6;
            margin-top: 8px;
        }

        .terms a {
            color: var(--text-secondary);
            text-decoration: underline;
            text-decoration-color: var(--border);
        }

        .terms a:hover { color: var(--text-primary); }

        /* ─── Footer ─── */
        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
            border-top: 1px solid var(--border);
        }

        footer span {
            font-size: 12px;
            color: var(--text-muted);
        }

        @media (max-width: 480px) {
            .topbar { padding: 16px 20px; }
            .card { padding: 28px 24px; }
            .field-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Top bar -->
    <header class="topbar">
        <a href="{{ url_for('main.index') }}" class="logo">alvera</a>
        <a href="{{ url_for('auth.login') }}" class="topbar-link">
            Zaten hesabın var mı? <span>Giriş yap</span>
        </a>
    </header>

    <!-- Main -->
    <main class="main">
        <div class="card">
            <div class="card-header">
                <div class="card-eyebrow">Alvera</div>
                <h1 class="card-title">Hesabınızı oluşturun</h1>
                <p class="card-sub">Dijital kimliğinizi inşa etmeye birkaç adım kaldı.</p>
            </div>

            <!-- Error -->
            {% if error %}
            <div class="error-banner">
                <span class="error-icon">⚠</span>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <!-- Form -->
            <form class="form" method="POST" action="{{ url_for('auth.register') }}">

                <div class="field">
                    <label class="field-label" for="full_name">Ad Soyad</label>
                    <input
                        class="field-input"
                        type="text"
                        id="full_name"
                        name="full_name"
                        placeholder="Ayşe Kaya"
                        value="{{ request.form.get('full_name', '') }}"
                        autocomplete="name"
                        required
                    >
                </div>

                <div class="field">
                    <label class="field-label" for="email">E-posta Adresi</label>
                    <input
                        class="field-input"
                        type="email"
                        id="email"
                        name="email"
                        placeholder="ayse@ornek.com"
                        value="{{ request.form.get('email', '') }}"
                        autocomplete="email"
                        required
                    >
                </div>

                <div class="field-row">
                    <div class="field">
                        <label class="field-label" for="password">Şifre</label>
                        <input
                            class="field-input"
                            type="password"
                            id="password"
                            name="password"
                            placeholder="En az 8 karakter"
                            autocomplete="new-password"
                            required
                            minlength="8"
                        >
                    </div>
                    <div class="field">
                        <label class="field-label" for="confirm_password">Şifre Tekrar</label>
                        <input
                            class="field-input"
                            type="password"
                            id="confirm_password"
                            name="confirm_password"
                            placeholder="Şifreyi tekrar girin"
                            autocomplete="new-password"
                            required
                        >
                    </div>
                </div>

                <button type="submit" class="btn-submit">
                    Hesap Oluştur <span>→</span>
                </button>

            </form>

            <p class="terms">
                Devam ederek <a href="#">Kullanım Koşulları</a>'nı ve
                <a href="#">Gizlilik Politikası</a>'nı kabul etmiş olursunuz.
            </p>
        </div>
    </main>

    <footer>
        <span>© 2025 Alvera. Tüm hakları saklıdır.</span>
    </footer>

    <script>
        // Şifre eşleşme kontrolü
        const pwd  = document.getElementById('password');
        const conf = document.getElementById('confirm_password');

        conf.addEventListener('input', () => {
            if (conf.value && pwd.value !== conf.value) {
                conf.setCustomValidity('Şifreler eşleşmiyor.');
                conf.style.borderColor = '#dc2626';
            } else {
                conf.setCustomValidity('');
                conf.style.borderColor = '';
            }
        });
    </script>
</body>
</html>
